<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Assistente Financeiro</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="brand">
          <span class="brand-mark">F</span>
          <div>
            <strong>Finanças</strong>
            <span>assistente pessoal</span>
          </div>
        </div>
      </header>

      <section class="workspace">
        <aside class="sidebar panel-screen" data-panel="summary" aria-label="Resumo financeiro">
          <div class="metric-grid">
            <article class="metric">
              <span>Receitas</span>
              <strong id="income">R$ 0,00</strong>
            </article>
            <article class="metric">
              <span>Despesas</span>
              <strong id="expenses">R$ 0,00</strong>
            </article>
            <article class="metric result">
              <span>Resultado</span>
              <strong id="result">R$ 0,00</strong>
            </article>
            <article class="metric">
              <span>A pagar</span>
              <strong id="payable">R$ 0,00</strong>
            </article>
          </div>

          <div class="panel">
            <div class="panel-title">
              <h2>Categorias</h2>
            </div>
            <div id="categories" class="category-list"></div>
          </div>
        </aside>

        <section class="chat-area panel-screen active" data-panel="chat" aria-label="Chat financeiro">
          <header class="topbar">
            <div>
              <h1>Assistente financeiro</h1>
              <p>Converse, envie comprovantes e acompanhe seus numeros.</p>
            </div>
            <label class="upload-button" title="Enviar comprovante, boleto, nota ou extrato">
              <input id="file-input" type="file" accept="image/*,.pdf,.txt,.csv" />
              <span>Enviar arquivo</span>
            </label>
          </header>

          <div id="messages" class="messages" aria-live="polite"></div>

          <form id="chat-form" class="composer">
            <input
              id="message-input"
              type="text"
              autocomplete="off"
              placeholder="Ex.: paguei R$ 89,90 no mercado hoje no pix"
            />
            <button type="submit" title="Enviar mensagem">Enviar</button>
          </form>
        </section>

        <aside class="ledger panel-screen" data-panel="review" aria-label="Lancamentos">
          <div class="panel-title">
            <h2>Aguardando confirmação</h2>
          </div>
          <div id="pending-transactions" class="transaction-list pending-list"></div>

          <div class="panel-title">
            <h2>Lançamentos</h2>
          </div>
          <div id="transactions" class="transaction-list"></div>
        </aside>

        <aside class="files-panel panel-screen" data-panel="files" aria-label="Arquivos">
          <div class="panel-title">
            <h2>Arquivos</h2>
          </div>
          <div id="documents" class="document-list"></div>
        </aside>
      </section>

      <nav class="tabbar" aria-label="Navegação principal">
        <button type="button" class="active" data-tab="chat">Chat</button>
        <button type="button" data-tab="review">Revisar <span id="pending-badge" class="badge" hidden>0</span></button>
        <button type="button" data-tab="summary">Resumo</button>
        <button type="button" data-tab="files">Arquivos <span id="files-badge" class="badge" hidden>0</span></button>
      </nav>
    </main>

    <datalist id="category-options">
      <option value="Mercado"></option>
      <option value="Alimentação"></option>
      <option value="Moradia"></option>
      <option value="Transporte"></option>
      <option value="Saúde"></option>
      <option value="Educação"></option>
      <option value="Lazer"></option>
      <option value="Renda"></option>
      <option value="Outros"></option>
    </datalist>

    <script src="/app.js" type="module"></script>
  </body>
</html>
